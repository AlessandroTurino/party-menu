<!doctype html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu di Laurea Interattivo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    :root {
      --bg-1: #010402;
      --bg-2: #02110a;
      --bg-3: #042515;
      --ink: #7cff9b;
      --muted: #4bdd73;
      --panel: rgba(2, 14, 9, 0.94);
      --accent: #8effa9;
      --warning: #d8ff68;
      --border: rgba(124, 255, 155, 0.22);
      --shadow-strong: 0 0 52px rgba(24, 201, 93, 0.18);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      color: var(--ink);
      font-family: "Share Tech Mono", monospace;
      background:
        radial-gradient(circle at 18% 18%, rgba(24, 201, 93, 0.15), transparent 32%),
        radial-gradient(circle at 84% 16%, rgba(142, 255, 169, 0.08), transparent 28%),
        radial-gradient(circle at 70% 78%, rgba(12, 122, 53, 0.18), transparent 34%),
        linear-gradient(140deg, var(--bg-1), var(--bg-2) 52%, var(--bg-3));
      padding: 30px 18px 50px;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(124, 255, 155, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124, 255, 155, 0.04) 1px, transparent 1px),
        repeating-linear-gradient(180deg, rgba(0, 0, 0, 0) 0, rgba(0, 0, 0, 0) 3px, rgba(124, 255, 155, 0.03) 4px);
      background-size: 100% 4px, 36px 36px, 100% 6px;
      pointer-events: none;
      opacity: 0.6;
    }

    .shell {
      width: min(1040px, 100%);
      margin: 0 auto;
    }

    .experience {
      min-height: calc(100vh - 80px);
      display: grid;
      place-items: center;
      animation: soft-rise 850ms ease-out both;
    }

    .terminal-window {
      width: min(920px, 100%);
      min-height: 680px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(6, 22, 14, 0.98), rgba(1, 7, 4, 0.98));
      box-shadow: var(--shadow-strong);
      overflow: hidden;
      position: relative;
    }

    .terminal-window::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(124, 255, 155, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124, 255, 155, 0.03) 1px, transparent 1px);
      background-size: 100% 4px, 28px 28px;
      pointer-events: none;
      opacity: 0.34;
    }

    .terminal-chrome {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(124, 255, 155, 0.15);
      background: rgba(4, 18, 11, 0.92);
      position: relative;
      z-index: 1;
    }

    .terminal-dots {
      display: flex;
      gap: 8px;
    }

    .terminal-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(124, 255, 155, 0.22);
      box-shadow: 0 0 10px rgba(124, 255, 155, 0.18);
    }

    .terminal-dot.is-live {
      background: var(--accent);
    }

    .terminal-title {
      color: var(--accent);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-size: 0.84rem;
      text-align: center;
      flex: 1;
    }

    .terminal-meta {
      color: var(--muted);
      font-size: 0.78rem;
      white-space: nowrap;
    }

    .terminal-screen {
      min-height: 624px;
      padding: 26px 22px 22px;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    .terminal-output {
      display: grid;
      gap: 0.45rem;
      align-content: start;
      flex: 1;
      overflow: auto;
      padding-right: 8px;
      scrollbar-width: thin;
      scrollbar-color: rgba(124, 255, 155, 0.32) transparent;
    }

    .terminal-output::-webkit-scrollbar {
      width: 8px;
    }

    .terminal-output::-webkit-scrollbar-thumb {
      background: rgba(124, 255, 155, 0.32);
      border-radius: 999px;
    }

    .terminal-line {
      color: var(--ink);
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      text-shadow: 0 0 9px rgba(124, 255, 155, 0.18);
    }

    .terminal-line.system {
      color: var(--muted);
    }

    .terminal-line.command {
      color: var(--warning);
    }

    .terminal-line.device {
      color: #ff4d4d;
      text-shadow: 0 0 12px rgba(255, 77, 77, 0.32);
    }

    .terminal-line.section {
      color: var(--accent);
      margin-top: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .terminal-line.item {
      padding-left: 1.1rem;
    }

    .terminal-line .cursor {
      display: inline-block;
      width: 0.62ch;
      margin-left: 0.08ch;
      background: currentColor;
      box-shadow: 0 0 10px currentColor;
      animation: blink-caret 820ms step-end infinite;
      vertical-align: -0.08em;
    }

    .terminal-status {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid rgba(124, 255, 155, 0.12);
      color: var(--muted);
      min-height: 1.6rem;
    }

    @media (max-width: 760px) {
      body {
        padding: 16px 10px 24px;
      }

      .experience {
        min-height: calc(100vh - 40px);
      }

      .terminal-window {
        min-height: 78vh;
      }

      .terminal-chrome {
        padding: 12px 14px;
        flex-wrap: wrap;
      }

      .terminal-title {
        order: 3;
        flex-basis: 100%;
      }

      .terminal-screen {
        padding: 18px 14px 16px;
        min-height: 70vh;
      }

      .terminal-line.item {
        padding-left: 0.7rem;
      }
    }

    @keyframes soft-rise {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes blink-caret {
      0%,
      49% {
        opacity: 1;
      }

      50%,
      100% {
        opacity: 0;
      }
    }
  </style>
</head>

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");

      latte: { label: "Latte" },
      senape: { label: "Senape" },
      "anidride-solforosa-e-solfiti": { label: "Anidride solforosa e solfiti" },
      lupini: { label: "Lupini" },
      nichel: { label: "Nichel" }
    };

    function normalizeAllergenName(value) {
      const source = String(value || "").trim().toLowerCase();

      if (!source) {
        return "";
      }

      if (source === "lattosio") {
        return "latte";
      }

      if (source === "sesamo") {
        return "semi-di-sesamo";
      }

      if (source === "solfiti") {
        return "anidride-solforosa-e-solfiti";
      }

      return source
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function extractAllergens(allergeni) {
      if (!allergeni) {
        return [];
      }

      if (Array.isArray(allergeni)) {
        return allergeni.flatMap((entry) => extractAllergens(entry));
      }

      const text = String(allergeni).includes(":")
        ? String(allergeni).split(":").slice(1).join(":")
        : String(allergeni);

      return text
        .split(",")
        .map((entry) => entry.trim())
        .filter(Boolean);
    }

    function formatAllergenSymbol(allergeni) {
      const allergenList = extractAllergens(allergeni);
      if (!allergenList.length) {
        return "";
      }

      const rendered = allergenList.map((name) => {
        const key = normalizeAllergenName(name);
        const badge = allergenBadges[key] || {
          label: name
        };
        const safeLabel = escapeHtml(badge.label);
        return `<span class="allergen-badge allergen-${key}" title="${safeLabel}" aria-label="${safeLabel}">${safeLabel}</span>`;
      }).join("");

      return `<span class="allergen-badges" aria-label="Allergeni">${rendered}</span>`;
    }

    function formatMenuItem(item, allergeni) {
      if (item && typeof item === "object" && Array.isArray(item.details)) {
        const details = item.details.map((detail) => {
          const detailName = escapeHtml(detail.name);
          return `${detailName}${formatAllergenSymbol(detail.allergeni)}`;
        }).join(", ");

        return `${escapeHtml(item.name)} (${details})`;
      }

      return `${escapeHtml(item)}${formatAllergenSymbol(allergeni)}`;
    }

    function getTypingDuration(text, multiplier = 42) {
      const content = String(text || "");
      return Math.min(Math.max(content.length * multiplier, 480), 2200);
    }

    function setTypedText(element, text, options = {}) {
      if (!element) {
        return;
      }

      const content = String(text ?? "").trim();
      const span = document.createElement("span");
      const delay = options.delay || 0;
      const duration = options.duration || getTypingDuration(content, options.multiplier);

      span.className = "type-text";
      span.textContent = content;
      span.style.setProperty("--typing-delay", `${delay}ms`);
      span.style.setProperty("--typing-duration", `${duration}ms`);
      span.style.setProperty("--typing-characters", Math.max(content.length, 1));

      element.replaceChildren(span);

      window.setTimeout(() => {
        if (span.isConnected) {
          span.classList.add("done");
        }
      }, delay + duration);
    }

    function primeStaticTypedText(selector, options = {}) {
      const element = typeof selector === "string" ? document.querySelector(selector) : selector;
      if (!element) {
        return;
      }

      setTypedText(element, element.textContent, options);
    }

    function renderStep(index) {
      const step = menuFlow[index];
      if (!step) {
        completeFlow();
        return;
      }

      if (hideTimeout) {
        clearTimeout(hideTimeout);
        hideTimeout = null;
      }
      revealCard.classList.remove("flipped", "exiting");

      frontIcon.innerHTML = iconByType[step.icon] || iconByType.cloche;
      setTypedText(frontCategory, step.category, { delay: 120, multiplier: 48 });
      setTypedText(backCategory, step.category, { delay: 120, multiplier: 48 });
      backItems.innerHTML = step.items.map((item, itemIndex) => `<li>${formatMenuItem(item, step.allergeni?.[itemIndex])}</li>`).join("");

      setTypedText(actionHint, "Toccami, car*", { delay: 420, multiplier: 38 });
      setTypedText(stepProgress, `Categoria ${index + 1} di ${menuFlow.length}`, { delay: 240, multiplier: 36 });
      canFlip = true;
    }

    function commitCurrentStep() {
      const step = menuFlow[activeIndex];
      const section = document.createElement("section");
      const list = step.items.map((item, itemIndex) => `<li>${formatMenuItem(item, step.allergeni?.[itemIndex])}</li>`).join("");
      const categoryIcon = iconByType[step.icon] || iconByType.cloche;
      const menuTarget = document.getElementById("revealedMenu") || revealedMenu;

      if (!menuTarget) {
        console.warn("Container #revealedMenu non trovato.");
        return;
      }

      section.className = "menu-section";
      section.innerHTML = `
        <h3 class="menu-section-title"><span class="section-icon" aria-hidden="true">${categoryIcon}</span><span class="section-title-copy"></span></h3>
        <ul>${list}</ul>
      `;

      menuTarget.appendChild(section);
      setTypedText(section.querySelector(".section-title-copy"), step.category, { delay: 120, multiplier: 40 });
    }

    function flipCard() {
      if (!canFlip || revealCard.classList.contains("flipped")) {
        return;
      }

      canFlip = false;
      revealCard.classList.add("flipped");
      setTypedText(actionHint, "Portate visibili.", { multiplier: 34 });

      hideTimeout = setTimeout(() => {
        commitCurrentStep();
        revealCard.classList.add("exiting");
        setTypedText(stepProgress, `Categoria ${activeIndex + 1} completata`, { multiplier: 34 });

        setTimeout(() => {
          activeIndex += 1;
          renderStep(activeIndex);
        }, 700);
      }, 2000);
    }

    function onCardKeydown(event) {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        flipCard();
      }
    }

    function completeFlow() {
      cardStage.classList.add("done");
      setTypedText(stepProgress, "Buona cena ed enjoy it!", { multiplier: 34 });
      stepProgress.classList.add("final-toast");
      const shellRoot = document.querySelector(".shell");
      if (shellRoot && stepProgress.parentElement !== shellRoot) {
        shellRoot.appendChild(stepProgress);
      }
    }

    revealCard.addEventListener("click", flipCard);
    revealCard.addEventListener("keydown", onCardKeydown);

    primeStaticTypedText(".hero h1", { delay: 80, multiplier: 54 });
    primeStaticTypedText(".menu-board h2", { delay: 260, multiplier: 46 });
    renderStep(activeIndex);

    const terminalOutput = document.getElementById("terminalOutput");
    const terminalStatus = document.getElementById("terminalStatus");

    function formatTerminalAllergens(allergeni) {
      const names = extractAllergens(allergeni).map((entry) => {
        const key = normalizeAllergenName(entry);
        return (allergenBadges[key] && allergenBadges[key].label) || entry;
      });

      return names.length ? ` [${names.join(" | ")}]` : "";
    }

    function formatTerminalItem(item, allergeni) {
      if (item && typeof item === "object" && Array.isArray(item.details)) {
        const details = item.details.map((detail) => {
          return `${detail.name}${formatTerminalAllergens(detail.allergeni)}`;
        }).join(", ");

        return `${item.name} (${details})`;
      }

      return `${String(item)}${formatTerminalAllergens(allergeni)}`;
    }

    function wait(ms) {
      return new Promise((resolve) => window.setTimeout(resolve, ms));
    }

    function charDelay(character, minDelay, maxDelay) {
      if (character === " ") {
        return minDelay;
      }

      if (",.;:!?".includes(character)) {
        return maxDelay + 36;
      }

      return Math.floor(Math.random() * (maxDelay - minDelay + 1)) + minDelay;
    }

    function scrollTerminal(targetLine = null) {
      if (!terminalOutput) {
        return;
      }

      if (targetLine && typeof targetLine.scrollIntoView === "function") {
        targetLine.scrollIntoView({
          block: "nearest",
          inline: "nearest"
        });
        return;
      }

      terminalOutput.scrollTop = terminalOutput.scrollHeight;
    }

    async function typeTerminalLine(text, options = {}) {
      const {
        className = "",
        minDelay = 8,
        maxDelay = 20,
        pauseAfter = 120
      } = options;

      const line = document.createElement("div");
      const textNode = document.createTextNode("");
      const cursor = document.createElement("span");

      line.className = `terminal-line ${className}`.trim();
      cursor.className = "cursor";
      line.append(textNode, cursor);
      terminalOutput.appendChild(line);
      scrollTerminal(line);

      for (const character of String(text)) {
        textNode.textContent += character;
        scrollTerminal(line);
        await wait(charDelay(character, minDelay, maxDelay));
      }

      cursor.remove();
      scrollTerminal(line);
      await wait(pauseAfter);
    }

    async function typeTerminalStatus(text) {
      terminalStatus.textContent = "";

      for (const character of String(text)) {
        terminalStatus.textContent += character;
        scrollTerminal();
        await wait(character === " " ? 20 : 42);
      }
    }

    function detectLikelyDeviceName() {
      const ua = String(navigator.userAgent || "").toLowerCase();
      const platform = String(navigator.platform || "").toLowerCase();
      const vendor = String(navigator.vendor || "").toLowerCase();
      const userAgentData = navigator.userAgentData || null;
      const hintedModel = String(userAgentData?.model || "").toLowerCase();
      const hintedBrands = Array.isArray(userAgentData?.brands)
        ? userAgentData.brands.map((entry) => String(entry.brand || "").toLowerCase()).join(" ")
        : "";
      const fingerprint = `${ua} ${platform} ${vendor} ${hintedModel} ${hintedBrands}`;

      if (fingerprint.includes("iphone")) {
        return "iPhone";
      }

      if (fingerprint.includes("ipad")) {
        return "iPad";
      }

      if (fingerprint.includes("samsung") || fingerprint.includes("galaxy") || fingerprint.includes("sm-")) {
        return "Samsung";
      }

      if (fingerprint.includes("xiaomi") || fingerprint.includes("redmi") || fingerprint.includes("poco")) {
        return "Xiaomi";
      }

      if (fingerprint.includes("huawei")) {
        return "Huawei";
      }

      if (fingerprint.includes("honor")) {
        return "Honor";
      }

      if (fingerprint.includes("oneplus")) {
        return "OnePlus";
      }

      if (fingerprint.includes("oppo")) {
        return "Oppo";
      }

      if (fingerprint.includes("vivo")) {
        return "Vivo";
      }

      if (fingerprint.includes("pixel") || fingerprint.includes("google")) {
        return "Google Pixel";
      }

      if (fingerprint.includes("mac")) {
        return "Mac";
      }

      if (fingerprint.includes("windows")) {
        return "Windows PC";
      }

      if (fingerprint.includes("android")) {
        return "Android device";
      }

      return "Unknown device";
    }

    async function detectPublicIp() {
      const endpoints = [
        "https://api.ipify.org?format=json",
        "https://api64.ipify.org?format=json"
      ];

      for (const endpoint of endpoints) {
        const controller = new AbortController();
        const timeoutId = window.setTimeout(() => controller.abort(), 1800);

        try {
          const response = await fetch(endpoint, {
            signal: controller.signal,
            cache: "no-store"
          });

          if (!response.ok) {
            continue;
          }

          const payload = await response.json();
          const ip = String(payload?.ip || "").trim();

          if (ip) {
            return ip;
          }
        } catch (error) {
          // Ignore and try the next endpoint.
        } finally {
          window.clearTimeout(timeoutId);
        }
      }

      return "IP UNAVAILABLE";
    }

    async function streamMenuToTerminal() {
      if (!terminalOutput || !terminalStatus) {
        return;
      }

      terminalOutput.replaceChildren();
      terminalStatus.textContent = "STATUS: fingerprinting device...";

      await typeTerminalLine("Rilevamento dispositivo in uso....", {
        className: "command",
        minDelay: 18,
        maxDelay: 32,
        pauseAfter: 220
      });

      const publicIpPromise = detectPublicIp();
      await wait(2400);
      const deviceName = detectLikelyDeviceName().toUpperCase();
      const publicIp = await publicIpPromise;
      await typeTerminalLine(`device::DISPOSITIVO IDENTIFICATO -> ${deviceName} | IP: ${publicIp}`, {
        className: "device",
        minDelay: 20,
        maxDelay: 36,
        pauseAfter: 260
      });

      terminalStatus.textContent = "STATUS: scanning nearby networks...";

      await typeTerminalLine("Connessione alla rete TIM-3248765235 in corso...", {
        className: "command",
        minDelay: 18,
        maxDelay: 32,
        pauseAfter: 260
      });

      const fakeHackLogs = [
        "wifi::adapter up | chipset spoofed | monitor mode locked",
        "net::chiave di autenticazione individuata | signal -47dBm | gateway fingerprint matched",
        "bypass::controlli di sicurezza evitati | dhcp lease mirrored | route cloaked",
        "payload::rilevazione menù effettuata | Buffet mappato",
        "drinking::rimozione limite alcolici in corso...",
        "drinking::limite rimosso con successo! | Alcol illimitato disponibile",
        "life-saver::individuazione allergeni effettuata",
        "decrypt::banchetto confermato | Renderizzazione menù in corso..",        
        "loading::menù renderizzato con successo"
      ];
      const preMenuStart = performance.now();

      for (const logLine of fakeHackLogs) {
        await typeTerminalLine(logLine, {
          className: "system",
          minDelay: 12,
          maxDelay: 22,
          pauseAfter: 120
        });
      }

      const remainingPrelude = Math.max(0, 3000 - (performance.now() - preMenuStart));
      if (remainingPrelude) {
        await wait(remainingPrelude);
      }

      await typeTerminalStatus("STATUS: tunnel established. Streaming hidden menu...");
      await typeTerminalLine("guest@laurea:~$ ./menu_laurea --stream", {
        className: "command",
        minDelay: 18,
        maxDelay: 30,
        pauseAfter: 320
      });

      for (let index = 0; index < menuFlow.length; index += 1) {
        const step = menuFlow[index];

        await typeTerminalLine(`[${String(index + 1).padStart(2, "0")}] ${step.category}`, {
          className: "section",
          minDelay: 22,
          maxDelay: 38,
          pauseAfter: 180
        });

        for (let itemIndex = 0; itemIndex < step.items.length; itemIndex += 1) {
          await typeTerminalLine(`- ${formatTerminalItem(step.items[itemIndex], step.allergeni?.[itemIndex])}`, {
            className: "item",
            minDelay: 16,
            maxDelay: 28,
            pauseAfter: 120
          });
        }
      }

      await typeTerminalLine("stream::complete - Declino ogni responsabilità per lancio di telefoni in preda allo spavento", {
        className: "system",
        minDelay: 18,
        maxDelay: 32,
        pauseAfter: 180
      });
      await typeTerminalStatus("STATUS: menu caricato. Buona cena ed enjoy it!");
    }

    streamMenuToTerminal();
  </script>
